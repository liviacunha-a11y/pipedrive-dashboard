<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deals Duplicados - Vendas Spot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }
        .topbar {
            background: #1c1f2b;
            border-bottom: 1px solid #2d3348;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar h1 { font-size: 18px; color: #fff; }
        .topbar .sub { font-size: 12px; color: #8b8fa3; margin-top: 2px; }
        .topbar-actions { display: flex; gap: 10px; align-items: center; }
        .btn {
            background: #2d3348;
            border: none;
            color: #8b8fa3;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn:hover { background: #3d4460; color: #fff; }
        .api-counter {
            font-size: 11px; color: #8b8fa3; background: #161825;
            padding: 4px 10px; border-radius: 6px; border: 1px solid #2d3348;
        }

        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 24px;
        }
        .kpi-card {
            background: #1c1f2b;
            border: 1px solid #2d3348;
            border-radius: 10px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .kpi-card.red::before { background: #f74f4f; }
        .kpi-card.orange::before { background: #f7954f; }
        .kpi-card.blue::before { background: #4f8ff7; }
        .kpi-card.purple::before { background: #a855f7; }
        .kpi-label { font-size: 11px; color: #8b8fa3; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .kpi-value { font-size: 36px; font-weight: 700; color: #fff; }
        .kpi-sub { font-size: 12px; color: #6b7080; margin-top: 6px; }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 0 24px 16px;
        }
        .tab {
            padding: 8px 18px;
            background: #1c1f2b;
            border: 1px solid #2d3348;
            color: #8b8fa3;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .tab:hover { border-color: #4f8ff7; color: #4f8ff7; }
        .tab.active { background: #4f8ff7; border-color: #4f8ff7; color: #fff; }

        .search-row {
            display: flex;
            gap: 10px;
            padding: 0 24px 16px;
            align-items: center;
        }
        .search-box {
            padding: 7px 14px;
            background: #1c1f2b;
            border: 1px solid #2d3348;
            border-radius: 8px;
            color: #e1e4e8;
            font-size: 13px;
            width: 300px;
        }
        .search-box:focus { outline: none; border-color: #4f8ff7; }

        .section { padding: 0 24px 24px; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .section-header h2 { font-size: 16px; color: #fff; }
        .count-badge {
            font-size: 13px; color: #8b8fa3;
            background: #2d3348; padding: 4px 12px; border-radius: 12px;
        }

        .dup-group {
            background: #1c1f2b;
            border: 1px solid #2d3348;
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .dup-group-header {
            background: #161825;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d3348;
            cursor: pointer;
        }
        .dup-group-header:hover { background: #1a1d2f; }
        .dup-key { font-size: 13px; color: #4f8ff7; font-weight: 600; }
        .dup-count {
            font-size: 11px; padding: 3px 10px; border-radius: 12px;
            background: rgba(247,79,79,0.15); color: #f74f4f; font-weight: 600;
        }
        .dup-type-badge {
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            margin-left: 8px;
        }
        .dup-type-phone { background: rgba(168,85,247,0.15); color: #a855f7; }
        .dup-type-email { background: rgba(79,143,247,0.15); color: #4f8ff7; }
        .dup-type-both { background: rgba(247,149,79,0.15); color: #f7954f; }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            padding: 8px 14px;
            text-align: left;
            font-size: 11px;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #161825;
            border-bottom: 1px solid #2d3348;
        }
        tbody tr { border-bottom: 1px solid #2d3348; }
        tbody tr:hover { background: #22253a; }
        tbody tr:last-child { border-bottom: none; }
        tbody td {
            padding: 8px 14px;
            font-size: 13px;
            color: #c9cdd5;
        }
        .link-deal { color: #4f8ff7; text-decoration: none; }
        .link-deal:hover { text-decoration: underline; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-green { background: rgba(34,197,94,0.15); color: #22c55e; }
        .badge-gray { background: rgba(139,143,163,0.15); color: #8b8fa3; }
        .badge-blue { background: rgba(79,143,247,0.15); color: #4f8ff7; }

        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,17,23,0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #2d3348;
            border-top-color: #4f8ff7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #8b8fa3; font-size: 14px; }

        .error-banner {
            background: rgba(247,79,79,0.1);
            border: 1px solid rgba(247,79,79,0.3);
            color: #f74f4f;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin: 0 24px 16px;
            display: none;
        }
        .empty-state { text-align: center; padding: 50px 20px; color: #6b7080; }

        @media (max-width: 900px) {
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div>
        <h1>Deals Duplicados - Vendas Spot</h1>
        <div class="sub" id="lastUpdated">Carregando...</div>
    </div>
    <div class="topbar-actions">
        <span class="api-counter" id="apiCounter">API: 0 calls</span>
        <button class="btn" onclick="refreshData()">&#8635; Atualizar</button>
        <button class="btn" onclick="exportCSV()">&#8681; CSV</button>
    </div>
</div>

<div class="kpi-row">
    <div class="kpi-card red">
        <div class="kpi-label">Grupos Duplicados</div>
        <div class="kpi-value" id="kpiGroups">-</div>
        <div class="kpi-sub">Grupos com 2+ deals</div>
    </div>
    <div class="kpi-card orange">
        <div class="kpi-label">Deals Duplicados</div>
        <div class="kpi-value" id="kpiDeals">-</div>
        <div class="kpi-sub">Total de deals em duplicidade</div>
    </div>
    <div class="kpi-card purple">
        <div class="kpi-label">Por Telefone</div>
        <div class="kpi-value" id="kpiPhone">-</div>
        <div class="kpi-sub">Grupos com mesmo telefone</div>
    </div>
    <div class="kpi-card blue">
        <div class="kpi-label">Por Email</div>
        <div class="kpi-value" id="kpiEmail">-</div>
        <div class="kpi-sub">Grupos com mesmo email</div>
    </div>
</div>

<div class="tabs">
    <button class="tab active" onclick="setTab('all',this)">Todos</button>
    <button class="tab" onclick="setTab('phone',this)">Por Telefone</button>
    <button class="tab" onclick="setTab('email',this)">Por Email</button>
</div>

<div class="search-row">
    <input type="text" class="search-box" placeholder="Buscar por nome, telefone, email..." oninput="onSearch(this.value)" />
</div>

<div class="error-banner" id="errorBanner"></div>

<div class="section">
    <div class="section-header">
        <h2 id="sectionTitle">Todos os Duplicados</h2>
        <span class="count-badge" id="sectionCount">0 grupos</span>
    </div>
    <div id="groupsContainer"></div>
    <div class="empty-state" id="emptyState" style="display:none;">Nenhum duplicado encontrado.</div>
</div>

<div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Carregando...</div>
</div>

<script>
var API_TOKEN = '4180d0bccc08eff4be87fd159024a0b7e26b3616';
var API_DOMAIN = 'https://seazone-fd92b9.pipedrive.com';
var SUBDOMAIN = 'seazone-fd92b9';
var PIPELINE_ID = 28; // Vendas Spot

var allGroups = []; // {key, type, deals[]}
var currentTab = 'all';
var searchTerm = '';
var apiCallCount = 0;

// ==================== API ====================
async function apiFetch(endpoint, params) {
    params = params || {};
    var url = new URL(API_DOMAIN + '/api/v1' + endpoint);
    url.searchParams.set('api_token', API_TOKEN);
    for (var k in params) url.searchParams.set(k, String(params[k]));
    var res = await fetch(url.toString());
    apiCallCount++;
    document.getElementById('apiCounter').textContent = 'API: ' + apiCallCount + ' calls';
    if (!res.ok) throw new Error('Pipedrive API ' + res.status);
    return res.json();
}

async function apiFetchAll(endpoint, params, label) {
    params = params || {};
    var all = [];
    var start = 0;
    var more = true;
    while (more) {
        var p = Object.assign({}, params, { start: start, limit: 500 });
        var r = await apiFetch(endpoint, p);
        if (r.success && r.data) {
            all = all.concat(r.data);
        } else break;
        more = r.additional_data && r.additional_data.pagination
            ? r.additional_data.pagination.more_items_in_collection : false;
        start = (r.additional_data && r.additional_data.pagination && r.additional_data.pagination.next_start)
            ? r.additional_data.pagination.next_start : start + 500;
        if (label) showLoading(label + ': ' + all.length + ' registros...');
    }
    return all;
}

// ==================== DATA ====================
function normalizePhone(phone) {
    if (!phone) return '';
    return phone.replace(/[\s\-\(\)\+\.]/g, '').replace(/^0+/, '');
}

function normalizeEmail(email) {
    if (!email) return '';
    return email.toLowerCase().trim();
}

async function refreshData() {
    apiCallCount = 0;
    document.getElementById('apiCounter').textContent = 'API: 0 calls';
    showLoading('Carregando deals do Vendas Spot...');

    try {
        // Fetch all open deals
        var rawDeals = await apiFetchAll('/deals', { pipeline_id: PIPELINE_ID, status: 'open' }, 'Deals');

        showLoading('Carregando dados de pessoas...');

        // Collect unique person IDs
        var personIds = {};
        rawDeals.forEach(function(d) {
            var pid = typeof d.person_id === 'object' && d.person_id ? d.person_id.value : d.person_id;
            if (pid) personIds[pid] = true;
        });
        var uniquePersonIds = Object.keys(personIds);

        // Fetch person details in batches
        var personMap = {};
        var batchSize = 50;
        for (var i = 0; i < uniquePersonIds.length; i += batchSize) {
            var batch = uniquePersonIds.slice(i, i + batchSize);
            showLoading('Carregando pessoas: ' + Math.min(i + batchSize, uniquePersonIds.length) + '/' + uniquePersonIds.length);
            var promises = batch.map(function(pid) {
                return apiFetch('/persons/' + pid).then(function(r) {
                    if (r.success && r.data) personMap[r.data.id] = r.data;
                }).catch(function() {});
            });
            await Promise.all(promises);
        }

        showLoading('Analisando duplicados...');

        // Build deals array with phone/email
        var deals = [];
        rawDeals.forEach(function(d) {
            var personId = typeof d.person_id === 'object' && d.person_id ? d.person_id.value : d.person_id;
            var personName = typeof d.person_id === 'object' && d.person_id ? d.person_id.name : '';
            var person = personMap[personId] || {};
            var ownerName = typeof d.user_id === 'object' && d.user_id ? d.user_id.name : '';
            var orgName = typeof d.org_id === 'object' && d.org_id ? d.org_id.name : '';

            // Extract phones
            var phones = [];
            if (person.phone) {
                person.phone.forEach(function(p) {
                    var n = normalizePhone(p.value);
                    if (n && n.length >= 8) phones.push(n);
                });
            }

            // Extract emails
            var emails = [];
            if (person.email) {
                person.email.forEach(function(e) {
                    var n = normalizeEmail(e.value);
                    if (n && n.includes('@')) emails.push(n);
                });
            }

            var stageId = d.stage_id;

            deals.push({
                id: d.id,
                title: d.title || '',
                person: personName || (person.name || ''),
                org: orgName,
                owner: ownerName,
                stage: d.stage_id,
                phones: phones,
                emails: emails,
                add_time: d.add_time || '',
                value: d.value || 0,
            });
        });

        // Find duplicates by phone
        var phoneGroups = {};
        deals.forEach(function(d) {
            d.phones.forEach(function(phone) {
                if (!phoneGroups[phone]) phoneGroups[phone] = [];
                if (!phoneGroups[phone].some(function(x) { return x.id === d.id; })) {
                    phoneGroups[phone].push(d);
                }
            });
        });

        // Find duplicates by email
        var emailGroups = {};
        deals.forEach(function(d) {
            d.emails.forEach(function(email) {
                if (!emailGroups[email]) emailGroups[email] = [];
                if (!emailGroups[email].some(function(x) { return x.id === d.id; })) {
                    emailGroups[email].push(d);
                }
            });
        });

        // Build groups (only where 2+ deals)
        allGroups = [];
        var seenGroupKeys = {};

        for (var phone in phoneGroups) {
            if (phoneGroups[phone].length >= 2) {
                var key = 'phone:' + phone;
                seenGroupKeys[key] = true;
                allGroups.push({
                    key: phone,
                    displayKey: formatPhone(phone),
                    type: 'phone',
                    deals: phoneGroups[phone],
                });
            }
        }

        for (var email in emailGroups) {
            if (emailGroups[email].length >= 2) {
                var key = 'email:' + email;
                seenGroupKeys[key] = true;
                allGroups.push({
                    key: email,
                    displayKey: email,
                    type: 'email',
                    deals: emailGroups[email],
                });
            }
        }

        // Sort: most duplicates first
        allGroups.sort(function(a, b) { return b.deals.length - a.deals.length; });

        updateKPIs();
        renderGroups();
        hideLoading();
        document.getElementById('lastUpdated').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR') + ' | ' + deals.length + ' deals analisados | ' + Object.keys(personMap).length + ' pessoas';
    } catch (e) {
        hideLoading();
        showError('Erro: ' + e.message);
        console.error(e);
    }
}

function formatPhone(phone) {
    if (phone.length === 13) return '+' + phone.slice(0,2) + ' (' + phone.slice(2,4) + ') ' + phone.slice(4,9) + '-' + phone.slice(9);
    if (phone.length === 12) return '+' + phone.slice(0,2) + ' (' + phone.slice(2,4) + ') ' + phone.slice(4,8) + '-' + phone.slice(8);
    if (phone.length === 11) return '(' + phone.slice(0,2) + ') ' + phone.slice(2,7) + '-' + phone.slice(7);
    if (phone.length === 10) return '(' + phone.slice(0,2) + ') ' + phone.slice(2,6) + '-' + phone.slice(6);
    return phone;
}

// ==================== UI ====================
function updateKPIs() {
    var phoneGroups = allGroups.filter(function(g) { return g.type === 'phone'; });
    var emailGroups = allGroups.filter(function(g) { return g.type === 'email'; });
    var totalDeals = 0;
    var seenDeals = {};
    allGroups.forEach(function(g) {
        g.deals.forEach(function(d) {
            if (!seenDeals[d.id]) { seenDeals[d.id] = true; totalDeals++; }
        });
    });

    document.getElementById('kpiGroups').textContent = allGroups.length;
    document.getElementById('kpiDeals').textContent = totalDeals;
    document.getElementById('kpiPhone').textContent = phoneGroups.length;
    document.getElementById('kpiEmail').textContent = emailGroups.length;
}

function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    renderGroups();
}

function onSearch(val) {
    searchTerm = val.toLowerCase().trim();
    renderGroups();
}

function getFilteredGroups() {
    var groups = allGroups;
    if (currentTab === 'phone') groups = groups.filter(function(g) { return g.type === 'phone'; });
    if (currentTab === 'email') groups = groups.filter(function(g) { return g.type === 'email'; });

    if (searchTerm) {
        groups = groups.filter(function(g) {
            if (g.key.toLowerCase().indexOf(searchTerm) !== -1) return true;
            if (g.displayKey.toLowerCase().indexOf(searchTerm) !== -1) return true;
            return g.deals.some(function(d) {
                return d.title.toLowerCase().indexOf(searchTerm) !== -1 ||
                    d.person.toLowerCase().indexOf(searchTerm) !== -1 ||
                    d.owner.toLowerCase().indexOf(searchTerm) !== -1;
            });
        });
    }
    return groups;
}

function renderGroups() {
    var groups = getFilteredGroups();
    var titles = { all: 'Todos os Duplicados', phone: 'Duplicados por Telefone', email: 'Duplicados por Email' };
    document.getElementById('sectionTitle').textContent = titles[currentTab] || '';
    document.getElementById('sectionCount').textContent = groups.length + ' grupo(s)';

    var container = document.getElementById('groupsContainer');
    if (groups.length === 0) {
        container.innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
        return;
    }
    document.getElementById('emptyState').style.display = 'none';

    container.innerHTML = groups.map(function(g, idx) {
        var typeBadge = g.type === 'phone'
            ? '<span class="dup-type-badge dup-type-phone">Telefone</span>'
            : '<span class="dup-type-badge dup-type-email">Email</span>';

        var rows = g.deals.map(function(d) {
            var date = d.add_time ? new Date(d.add_time).toLocaleDateString('pt-BR') : '-';
            var phones = d.phones.join(', ') || '-';
            var emails = d.emails.join(', ') || '-';
            return '<tr>' +
                '<td><a class="link-deal" href="https://' + SUBDOMAIN + '.pipedrive.com/deal/' + d.id + '" target="_blank">' + esc(trunc(d.title, 30)) + '</a></td>' +
                '<td>' + esc(trunc(d.person, 25)) + '</td>' +
                '<td>' + esc(phones) + '</td>' +
                '<td>' + esc(trunc(emails, 30)) + '</td>' +
                '<td><span class="badge badge-gray">' + esc(trunc(d.owner, 18)) + '</span></td>' +
                '<td>' + date + '</td>' +
                '</tr>';
        }).join('');

        return '<div class="dup-group">' +
            '<div class="dup-group-header" onclick="toggleGroup(' + idx + ')">' +
                '<div><span class="dup-key">' + esc(g.displayKey) + '</span>' + typeBadge + '</div>' +
                '<span class="dup-count">' + g.deals.length + ' deals</span>' +
            '</div>' +
            '<div id="group-' + idx + '">' +
                '<table><thead><tr>' +
                    '<th>Deal</th><th>Pessoa</th><th>Telefone(s)</th><th>Email(s)</th><th>Proprietario</th><th>Criado em</th>' +
                '</tr></thead><tbody>' + rows + '</tbody></table>' +
            '</div>' +
        '</div>';
    }).join('');
}

function toggleGroup(idx) {
    var el = document.getElementById('group-' + idx);
    if (el.style.display === 'none') el.style.display = '';
    else el.style.display = 'none';
}

// ==================== EXPORT ====================
function exportCSV() {
    var groups = getFilteredGroups();
    if (groups.length === 0) return;
    var headers = ['Grupo', 'Tipo', 'Chave', 'Deal ID', 'Deal', 'Pessoa', 'Telefone(s)', 'Email(s)', 'Proprietario', 'Criado em', 'Link Pipedrive'];
    var rows = [];
    groups.forEach(function(g, i) {
        g.deals.forEach(function(d) {
            rows.push([i + 1, g.type, g.key, d.id, d.title, d.person, d.phones.join('; '), d.emails.join('; '), d.owner, d.add_time, 'https://' + SUBDOMAIN + '.pipedrive.com/deal/' + d.id]);
        });
    });
    var csv = [headers].concat(rows).map(function(row) {
        return row.map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',');
    }).join('\n');
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'deals_duplicados_vendas_spot_' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
}

// ==================== HELPERS ====================
function showLoading(t) { document.getElementById('loadingText').textContent = t; document.getElementById('loading').classList.add('active'); }
function hideLoading() { document.getElementById('loading').classList.remove('active'); }
function showError(m) { var e = document.getElementById('errorBanner'); e.textContent = m; e.style.display = 'block'; setTimeout(function() { e.style.display = 'none'; }, 10000); }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function trunc(s, n) { return s.length > n ? s.slice(0, n) + '...' : s; }

// ==================== INIT ====================
refreshData();
</script>
</body>
</html>
